<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Escape from Tung Tung Sahur</title>
    <link rel="stylesheet" href="styles/style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/13.2.0/math.min.js"></script>
    <script src="./scripts/input.js"></script>
    <script src="./scripts/obj-loader.js"></script>
    <script src="./scripts/game.js"></script>
    <script src="./scripts/monster.js"></script>
    <script src="./scripts/door.js"></script>
    <script src="./scripts/key.js"></script>

    <script id="vertex-shader" type="notjs">
      attribute vec4 position;
      attribute vec2 texCoord;
      attribute vec3 normal;
      uniform mat4 transfproj;
      uniform mat4 transf;
      uniform vec3 lightpos;
      uniform vec3 campos;
      varying vec2 v_texCoord;
      varying vec3 v_normal;
      varying vec3 pointToLight;
      varying vec3 pointToCam;
      void main() {
          pointToLight = lightpos - position.xyz;
          pointToCam   = campos   - position.xyz;
          v_normal   = (transf * vec4(normal, 1.0)).xyz;
          v_texCoord = vec2(texCoord.x, 1.0 - texCoord.y);
          gl_Position = transfproj * position;
      }
    </script>

    <script id="frag-shader" type="notjs">
      precision mediump float;
      uniform sampler2D tex;
      uniform vec3 lightDirection;
      uniform vec3 lightColor;
      uniform bool useSolidColor;
      uniform vec3 solidColor;
      varying vec2 v_texCoord;
      varying vec3 v_normal;
      varying vec3 pointToLight;
      varying vec3 pointToCam;
      void main() {
          vec3 pToLight = normalize(pointToLight);
          vec3 pToCam   = normalize(pointToCam);
          vec3 halfVec  = normalize(pToCam + pToLight);
          vec3 v_normal_n       = normalize(v_normal);
          vec3 lightDirection_n = normalize(-lightDirection);
          float lightd = max(dot(v_normal_n, lightDirection_n), 0.0);
          float lightp = max(dot(v_normal_n, pToLight),         0.0);
          float lighte = max(dot(v_normal_n, halfVec),          0.0);
          vec3 baseColor;
          float alpha;
          if (useSolidColor) {
              baseColor = solidColor;
              alpha = 1.0;
          } else {
              vec4 texSample = texture2D(tex, v_texCoord);
              baseColor = texSample.rgb;
              alpha     = texSample.a;
          }
          gl_FragColor.rgb  = 0.20 * lightColor * baseColor;
          gl_FragColor.rgb += 0.20 * lightColor * lightd * baseColor;
          gl_FragColor.rgb += 0.50 * lightColor * lightp * baseColor;
          gl_FragColor.rgb += lightColor * pow(lighte, 500.0) * baseColor;
          gl_FragColor.a    = alpha;
      }
    </script>
  </head>
  <body onload="init()">
    <canvas
      id="glcanvas1"
      style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        display: block;
      "
    ></canvas>
    <p id="click-hint" style="color: #aaa; font-family: monospace">
      Clique no canvas para capturar o mouse. ESC para soltar.
    </p>

    <div id="gameOverScreen" class="overlay-screen hidden">
      <h1>GAME OVER</h1>
      <p>O Tung Tung Sahur te pegou!</p>
      <button id="btnRestart">Tentar Novamente</button>
    </div>

    <div id="victoryScreen" class="overlay-screen hidden">
      <h1>VITÓRIA!</h1>
      <p>Você escapou do Tung Tung Sahur!</p>
      <button id="btnNext">Jogar Novamente</button>
    </div>

    <div id="key-item" class="overlay hidden">
      <img src="./assets/images/key_snapshot.png" height="200" />
    </div>

    <div id="menu">
      <h1>Escape From Tung Tung Sahur</h1>
      <button id="button-play">Play</button>
      <button id="button-menu">Instructions</button>
      <button id="button-exit">Exit</button>
    </div>

    <div id="pauseMenu">
      <button onclick="continueGame()">Continue</button>
      <button onclick="returnMenu()">Return to the menu</button>
    </div>

    <div id="instructionsPanel" class="panel">
      <h2>Instructions</h2>
      <p>WASD - Move</p>
      <p>Mouse - Camera</p>
      <p>Key ESC - Pause</p>

      <button onclick="closeInstructions()">Back</button>
    </div>

    <script src="./scripts/main.js"></script>
    <script src="./scripts/camera.js"></script>
    <script src="./scripts/scene.js"></script>
    <script src="./scripts/webgl-utils.js"></script>
  </body>
</html>
